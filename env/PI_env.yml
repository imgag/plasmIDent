name: PI_env
channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  - bedtools
  - circos
  - filtlong
  - glimmer
  - minimap2
  - mosdepth
  - r-base
  - r-data.table
  - r-seqinr
  - rgi
  - samtools

# Note: `glimmer` currently resolves on linux-64 from Bioconda, but not on
# osx-arm64. On Apple Silicon, prefer the container profile or create the env
# under linux-64 compatibility, for example with `CONDA_SUBDIR=linux-64`.
